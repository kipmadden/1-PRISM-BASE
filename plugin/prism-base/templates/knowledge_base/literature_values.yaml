# ─────────────────────────────────────────────────────────────────────────────
# GOLDEN RATIO and related PRISM-native constants
# ─────────────────────────────────────────────────────────────────────────────

prism_geometric_constants:
  phi:
    value: 1.6180339887498949
    uncertainty: 0
    units: dimensionless
    definition: (1 + sqrt(5))/2
    notes: Golden ratio; candidate for log-spiral pitch in PRISM ansatz.
  log_phi:
    value: 0.4812118250596035
    uncertainty: 0
    units: dimensionless
    definition: ln(phi)
  two_pi_over_log_phi:
    value: 13.05704777
    uncertainty: 0
    units: dimensionless
    notes: Frequency modulator in the sin(2π·log(n)/log(φ)) signature.
