  <!-- 4D-axis label -->
  <line x1="80" y1="320" x2="600" y2="320"
        stroke="#2d3748" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <text x="340.0" y="314" text-anchor="middle"
        fill="#718096" font-size="12" font-style="italic">
    one spatial axis of 4D spacetime
  </text>

  <!-- L_chi label (circumference of cap) -->
  <path d="M 570 144.0
           C 550 110.0,
             630 110.0,
             610 144.0"
        stroke="#dd6b20" stroke-width="1.4" fill="none" marker-end="url(#arrow2)"/>
  <text x="590" y="100.0" text-anchor="middle"
        fill="#dd6b20" font-size="13" font-weight="bold">
    L<tspan baseline-shift="sub" font-size="10">χ</tspan> = 2π / α
  </text>
  <text x="590" y="118.0" text-anchor="middle"
        fill="#718096" font-size="11" font-style="italic">
    (closure condition, P-5)
  </text>

  <!-- spiral legend -->
  <line x1="520" y1="310" x2="550" y2="310"
        stroke="#6b46c1" stroke-width="2"/>
  <text x="556" y="314" fill="#2d3748" font-size="12">
    electron worldline:
  </text>
  <text x="556" y="330" fill="#6b46c1" font-size="12" font-style="italic" font-weight="bold">
