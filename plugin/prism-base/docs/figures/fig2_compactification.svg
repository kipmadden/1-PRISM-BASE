        stroke="#cbd5e0" stroke-width="1"/>
  <line x1="90" y1="280" x2="590" y2="280"
        stroke="#cbd5e0" stroke-width="1"/>
  <ellipse cx="590" cy="215.0" rx="14" ry="65.0"
           fill="#fafafa" stroke="#cbd5e0" stroke-width="1"/>

